<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container-fluid page-shell py-2 py-md-4">
    <div class="app-frame">
        <h1>Library Management System</h1>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card app-card">
                    <div class="card-body">
                        <h5>Add Book</h5>
                        <form action="/books/save" method="post" class="row g-3">
                            <div class="col-md-6">
                                <input class="form-control" name="title" placeholder="Book title" required>
                            </div>
                            <div class="col-md-6">
                                <input class="form-control" name="isbn" placeholder="ISBN" required>
                            </div>
                            <div class="col-md-6">
                                <input class="form-control glow-input" name="authorName" placeholder="Author name" required>
                            </div>
                            <div class="col-md-6">
                                <input class="form-control" name="authorEmail" placeholder="Author email">
                            </div>
                            <div class="col-12">
                                <button class="btn btn-primary w-100">Save Book</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card app-card">
                    <div class="card-body">
                        <h5>Add Member</h5>
                        <form action="/members/save" method="post">
                            <input class="form-control mb-3" name="name" placeholder="Member name" required>
                            <input class="form-control mb-3" name="phoneNumber" placeholder="Phone number" required>
                            <button class="btn btn-primary w-100">Save Member</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="card app-card mt-4">
            <div class="card-body">
                <h5>View Books By Author</h5>
                <form action="/" method="get" class="row g-3 align-items-end">
                    <div class="col-md-9">
                        <input class="form-control" name="authorName" placeholder="Enter author name" th:value="${authorName}">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100">Search</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="row g-4 mt-1">
            <div class="col-lg-6">
                <div class="card app-card">
                    <div class="card-body">
                        <h5>Issue Book</h5>
                        <form action="/issue-book" method="post" class="row g-3">
                            <div class="col-6">
                                <select class="form-select" name="memberId" required>
                                    <option value="">Select...</option>
                                    <option th:each="member : ${members}" th:value="${member.id}" th:text="${member.name}"></option>
                                </select>
                            </div>
                            <div class="col-6">
                                <select class="form-select" name="bookId" required>
                                    <option value="">Select...</option>
                                    <option th:each="book : ${books}" th:value="${book.id}" th:text="${book.title}"></option>
                                </select>
                            </div>
                            <div class="col-12">
                                <button class="btn btn-success w-100">Issue Book</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card app-card">
                    <div class="card-body">
                        <h5>Return Book</h5>
                        <form action="/return-book" method="post" class="row g-3">
                            <div class="col-6">
                                <select class="form-select" name="memberId" required>
                                    <option value="">Select...</option>
                                    <option th:each="member : ${members}" th:value="${member.id}" th:text="${member.name}"></option>
                                </select>
                            </div>
                            <div class="col-6">
                                <select class="form-select" name="bookId" required>
                                    <option value="">Select...</option>
                                    <option th:each="book : ${books}" th:value="${book.id}" th:text="${book.title}"></option>
                                </select>
                            </div>
                            <div class="col-12">
                                <button class="btn btn-return w-100">Return Book</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="card app-card mt-4 table-card">
            <div class="card-body">
                <h5>Book List</h5>
                <table class="table table-bordered align-middle">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>ISBN</th>
                            <th>Authors</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${books}">
                            <td th:text="${book.title}"></td>
                            <td th:text="${book.isbn}"></td>
                            <td>
                                <span th:each="author, iterStat : ${book.authors}">
                                    <span th:text="${author.name}"></span><span th:if="${!iterStat.last}">, </span>
                                </span>
                            </td>
                            <td>
                                <span th:if="${book.issued}" class="status-badge checked-out">Checked Out</span>
                                <span th:unless="${book.issued}" class="status-badge available">Available</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(books)}">
                            <td colspan="4" class="text-center text-light-emphasis">No books found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
