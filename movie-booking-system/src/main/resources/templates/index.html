<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="cinema-hero">
    <div class="container py-5">
        <p class="eyebrow">Movie Booking</p>
        <h1>Book seats, manage theaters, and track tickets</h1>
        <p class="hero-copy">A darker cinema-style interface for movie entries, theater setup, ticket booking, and available seat display.</p>
    </div>
</div>

<div class="container py-4 pb-5">
    <div class="row g-4">
        <div class="col-lg-4"><div class="card app-card"><div class="card-body">
            <h5>Add Theater</h5>
            <form action="/theaters/save" method="post">
                <input class="form-control mb-3" name="name" placeholder="Theater name" required>
                <input class="form-control mb-3" name="location" placeholder="Location" required>
                <button class="btn btn-outline-light w-100">Save Theater</button>
            </form>
        </div></div></div>
        <div class="col-lg-4"><div class="card app-card"><div class="card-body">
            <h5>Add Movie</h5>
            <form action="/movies/save" method="post">
                <select class="form-select mb-3" name="theaterId" required>
                    <option value="">Select theater</option>
                    <option th:each="theater : ${theaters}" th:value="${theater.id}" th:text="${theater.name}"></option>
                </select>
                <input class="form-control mb-3" name="title" placeholder="Movie title" required>
                <input class="form-control mb-3" name="availableSeats" type="number" placeholder="Available seats" required>
                <button class="btn btn-danger w-100">Save Movie</button>
            </form>
        </div></div></div>
        <div class="col-lg-4"><div class="card app-card accent-card"><div class="card-body">
            <h5>Book Ticket</h5>
            <form action="/tickets/save" method="post">
                <select class="form-select mb-3" name="movieId" required>
                    <option value="">Select movie</option>
                    <option th:each="movie : ${movies}" th:value="${movie.id}" th:text="${movie.title}"></option>
                </select>
                <input class="form-control mb-3" name="customerName" placeholder="Customer name" required>
                <input class="form-control mb-3" name="seatCount" type="number" placeholder="Seat count" required>
                <button class="btn btn-danger w-100">Book Ticket</button>
            </form>
        </div></div></div>
    </div>

    <div class="section-head mt-5">
        <h2>Available Seats</h2>
        <p>Check which movie still has seats before booking.</p>
    </div>
    <div class="card table-card">
        <div class="card-body">
            <table class="table align-middle">
                <thead><tr><th>Movie</th><th>Theater</th><th>Seats Left</th></tr></thead>
                <tbody>
                    <tr th:each="movie : ${movies}">
                        <td th:text="${movie.title}"></td>
                        <td th:text="${movie.theater != null ? movie.theater.name : '-'}"></td>
                        <td th:text="${movie.availableSeats}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
